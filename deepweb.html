<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Deep web</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:Arial;
      background:black;
      color:white;
    }

    /* Fondo animado */

    body::before{
      content:"";
      position:absolute;
      width:200%;
      height:200%;
      background:
      radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 20%);
      background-size:150px 150px;
      animation:mover 20s linear infinite;
    }

    @keyframes mover{
      from{
        transform:translate(0,0);
      }

      to{
        transform:translate(-200px,-200px);
      }
    }

    .contenedor{
      position:relative;
      z-index:1;
      text-align:center;
      backdrop-filter: blur(5px);
      padding:50px;
      border-radius:25px;
      background:rgba(255,255,255,0.05);
      box-shadow:0 0 30px rgba(255,0,0,0.3);
    }

    h1{
      font-size:70px;
      margin-bottom:40px;
      text-shadow:
      0 0 10px red,
      0 0 20px red,
      0 0 40px red;
      animation:brillo 2s infinite alternate;
    }

    @keyframes brillo{
      from{
        opacity:0.7;
      }

      to{
        opacity:1;
      }
    }

    button{
      width:300px;
      padding:18px;
      margin:15px;
      border:none;
      border-radius:20px;
      font-size:22px;
      color:white;
      background:linear-gradient(45deg,#700,#f00);
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(255,0,0,0.5);
    }

    button:hover{
      transform:scale(1.1);
      box-shadow:
      0 0 20px red,
      0 0 40px red,
      0 0 60px red;
    }

  </style>
</head>

<body>

  <div class="contenedor">

    <h1>Deep web</h1>

    <button>Participar en el sorteo</button>

    <br>

    <button>Comprar</button>

  </div>

</body>
</html>
